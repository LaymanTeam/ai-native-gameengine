<!DOCTYPE html>
<html lang="en" data-theme="bone">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge — Studio</title>
<link rel="stylesheet" href="forge.css" />
<style>
  .wrap { max-width: 1200px; margin: 0 auto; padding: var(--sp-14) var(--sp-10) 80px; }
  .head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: var(--sp-3); }
  .substat { color: var(--muted); margin-bottom: var(--sp-6); }
  .substat b { color: var(--ink); font-weight: 500; }

  .toolbar-row { display: flex; align-items: center; gap: var(--sp-4); margin-bottom: var(--sp-8); }
  .filters { display: flex; gap: var(--sp-1); }
  .filters button { background: 0; border: 0; font-family: var(--font); font-size: var(--fs-sm); color: var(--muted); padding: 7px 13px; border-radius: var(--r-full); cursor: pointer; transition: var(--t); }
  .filters button.on { background: var(--paper-2); color: var(--ink); }
  .search { margin-left: auto; display: flex; align-items: center; gap: 9px; background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--r-md); padding: 9px 14px; min-width: 220px; transition: border-color var(--t), box-shadow var(--t); }
  .search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .search input { border: 0; background: transparent; outline: 0; font-family: var(--font); font-size: var(--fs-sm); color: var(--ink); width: 100%; }
  .search input::placeholder { color: var(--faint); }
  .search svg { color: var(--muted); flex-shrink: 0; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); gap: var(--sp-6); }

  .card { border: 1px solid var(--line); border-radius: var(--r-xl); overflow: hidden; background: var(--paper); cursor: pointer;
          transition: transform var(--t), box-shadow var(--t), border-color var(--t); }
  .card:hover { transform: translateY(-4px); box-shadow: var(--sh-3); border-color: var(--line); }
  .thumb { position: relative; aspect-ratio: 16/10; background: var(--canvas); border-bottom: 1px solid var(--line-2); }
  .thumb canvas { display: block; width: 100%; height: 100%; }
  .ver { position: absolute; top: 11px; left: 12px; font-size: var(--fs-cap); color: rgba(var(--oc),0.55); background: var(--glass); border: 1px solid var(--glass-line); border-radius: var(--r-full); padding: 2px 9px; backdrop-filter: blur(4px); }
  .liveflag { position: absolute; top: 11px; right: 12px; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); opacity: 0; transition: opacity var(--t); display: flex; align-items: center; gap: 5px; }
  .card:hover .liveflag { opacity: 1; }
  .liveflag .ld { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }
  .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 10px; opacity: 0; transition: opacity var(--t); }
  .card:hover .overlay { opacity: 1; }
  .ob { display: flex; align-items: center; gap: 7px; background: var(--glass); border: 1px solid var(--glass-line); border-radius: var(--r-md); padding: 9px 15px; font-size: var(--fs-sm); color: var(--ink); backdrop-filter: blur(8px); cursor: pointer; transition: transform var(--t-fast), background var(--t-fast); }
  .ob:hover { transform: scale(1.04); }
  .ob.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .cmeta { padding: 14px 16px 16px; }
  .cmeta .ct { font-size: 15px; font-weight: 500; }
  .crow { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .crow .cs { color: var(--muted); font-size: var(--fs-sm); }
  .crow .csc { display: flex; align-items: center; gap: 6px; font-size: var(--fs-sm); }
  .crow .csc .d { width: 7px; height: 7px; border-radius: 50%; }

  .newcard { border: 1px dashed rgba(var(--oc),0.2); border-radius: var(--r-xl); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--sp-3); color: var(--muted); cursor: pointer; min-height: 224px; transition: all var(--t); }
  .newcard:hover { border-color: var(--accent); color: var(--ink); background: var(--accent-soft); }
  .newcard .plus { width: 46px; height: 46px; border-radius: 50%; border: 1px solid currentColor; display: grid; place-items: center; font-size: 22px; font-weight: 300; transition: transform var(--t); }
  .newcard:hover .plus { transform: rotate(90deg); }

  /* dialog */
  .scrim { position: fixed; inset: 0; background: rgba(20,18,14,0.32); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity var(--t); z-index: 50; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .dialog { position: fixed; z-index: 51; left: 50%; top: 50%; transform: translate(-50%,-46%) scale(.97); opacity: 0; pointer-events: none;
            width: min(700px, calc(100vw - 48px)); max-height: 86vh; display: flex; flex-direction: column;
            background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-2xl); overflow: hidden; box-shadow: var(--sh-pop);
            transition: opacity var(--t), transform var(--t); }
  .dialog.open { opacity: 1; pointer-events: auto; transform: translate(-50%,-50%) scale(1); transition: opacity var(--t), transform .4s var(--ease-spring); }
  .dhead { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--line-2); }
  .dav { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: var(--accent-ink); display: grid; place-items: center; }
  .dav svg { width: 16px; height: 16px; }
  .dhead .dt { font-size: 15px; font-weight: 500; }
  .dhead .dsub { font-size: var(--fs-xs); color: var(--muted); }
  .dhead .x { margin-left: auto; }

  .dthread { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: var(--sp-5); min-height: 220px; }
  .turn { display: flex; gap: 11px; animation: rise .4s var(--ease) both; }
  .turn.you { flex-direction: row-reverse; }
  .av { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; margin-top: 2px; }
  .av.forge { background: var(--accent); color: var(--accent-ink); } .av.forge svg { width: 14px; height: 14px; }
  .av.you { background: var(--paper-2); border: 1px solid var(--line); color: var(--muted); font-size: 11px; }
  .tbody { display: flex; flex-direction: column; gap: 8px; max-width: 86%; }
  .turn.you .tbody { align-items: flex-end; }
  .who { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }
  .text { font-size: var(--fs-body); line-height: 1.6; }
  .text .caret { display: inline-block; width: 7px; height: 15px; background: var(--accent); margin-left: 2px; vertical-align: -2px; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .turn.you .text { background: var(--paper-2); border: 1px solid var(--line); border-radius: 13px 13px 4px 13px; padding: 10px 14px; }
  .trace { display: flex; gap: 12px; flex-wrap: wrap; }
  .step { display: flex; align-items: center; gap: 6px; font-size: var(--fs-xs); color: var(--muted); }
  .step .m { width: 14px; height: 14px; border-radius: 50%; display: grid; place-items: center; font-size: 9px; }
  .step.done .m { background: var(--accent-soft); color: var(--accent); }
  .step.active .m { background: var(--accent); color: var(--accent-ink); animation: spin 1.1s linear infinite; }
  .step.active { color: var(--ink); }
  .step.todo .m { box-shadow: 0 0 0 1px var(--line) inset; color: transparent; }
  .ready { display: flex; align-items: center; gap: 10px; border: 1px solid var(--line); border-radius: 13px; padding: 12px 14px; background: var(--paper-2); animation: rise .4s var(--ease) both; }
  .ready .tk { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: var(--accent-ink); display: grid; place-items: center; font-size: 10px; }
  .ready .ot { margin-left: auto; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }

  .dcomposer { padding: 14px 18px 18px; border-top: 1px solid var(--line-2); }
  .box { background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 11px 13px 9px; transition: border-color var(--t), box-shadow var(--t); }
  .box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .box textarea { width: 100%; resize: none; background: transparent; border: 0; outline: 0; color: var(--ink); font-family: var(--font); font-size: var(--fs-body); line-height: 1.5; min-height: 22px; max-height: 120px; }
  .box textarea::placeholder { color: var(--faint); }
  .toolbar { display: flex; align-items: center; gap: 4px; margin-top: 7px; }
  .spacer { flex: 1; }
  .send { width: 34px; height: 34px; border-radius: var(--r-md); background: var(--ink); color: var(--paper); border: 0; cursor: pointer; display: grid; place-items: center; transition: transform var(--t-fast), opacity var(--t); }
  .send:hover { opacity: .9; transform: translateY(-1px); }
</style>
</head>
<body>

  <header class="topbar">
    <div class="wordmark">For<b>ge</b></div>
    <nav class="nav"><a class="on">Library</a><a href="schema.html">Schema</a><a>Evals</a></nav>
    <div class="end">
      <div class="kbd-hint" id="cmdk"><kbd>⌘</kbd><kbd>K</kbd> new</div>
      <span class="status"><span class="pip"></span> ready</span>
      <div class="avatar">T</div>
    </div>
  </header>

  <main class="wrap">
    <div class="head">
      <h1 class="display rise">Studio</h1>
      <button class="btn btn-primary rise" id="newBtn" style="animation-delay:.05s"><span style="font-size:16px;font-weight:300">＋</span> New game</button>
    </div>
    <div class="substat rise" style="animation-delay:.08s"><b>6 games</b> · 4 playable · average score <b>84</b></div>

    <div class="toolbar-row rise" style="animation-delay:.12s">
      <div class="filters">
        <button class="on">All</button><button>Playable</button><button>Recent</button><button>Top scored</button>
      </div>
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input placeholder="Search your games…" />
      </div>
    </div>

    <div class="grid" id="grid">
      <div class="newcard rise" id="newCard" style="animation-delay:.16s">
        <div class="plus">＋</div>
        <div>Describe a new game</div>
      </div>
    </div>
  </main>

  <!-- dialog -->
  <div class="scrim" id="scrim"></div>
  <div class="dialog" id="dialog" role="dialog" aria-modal="true" aria-labelledby="dTitle">
    <div class="dhead">
      <div class="dav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2l2.2 6.6H21l-5.4 4 2 6.6L12 15l-5.6 4.2 2-6.6L3 8.6h6.8z"/></svg></div>
      <div><div class="dt" id="dTitle">New game</div><div class="dsub" id="dSub">describe it in plain language</div></div>
      <button class="icon-btn x" id="closeBtn" aria-label="Close">✕</button>
    </div>
    <div class="dthread noscroll" id="dthread"></div>
    <div class="dcomposer">
      <div class="box">
        <textarea rows="1" id="dInput" placeholder="Describe the game you want…" spellcheck="false"></textarea>
        <div class="toolbar">
          <button class="icon-btn" title="add reference image"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M3 17l5-4 4 3 3-2 6 5"/></svg></button>
          <button class="icon-btn" title="voice"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg></button>
          <div class="seg"><button class="on">Full</button><button>Balance</button><button>Style</button></div>
          <span class="spacer"></span>
          <button class="send" id="dSend" aria-label="Send"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 19V5M6 11l6-6 6 6"/></svg></button>
        </div>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

<script>
const GAMES = [
  { id:'coastal', title:'Coastal Run',  genre:'survivor · top-down', v:'v4', score:94, field:'#e7e4db', player:'#5f6b4d', enemies:['#c2a77f','#8ea1ab','#b89aa0'] },
  { id:'tide',    title:'Tide Keeper',  genre:'dodger · top-down',   v:'v3', score:88, field:'#e2e7ea', player:'#4a6470', enemies:['#9aa7b0','#cdb89a','#a9b59c'] },
  { id:'ember',   title:'Ember Drift',  genre:'shooter · arena',     v:'v2', score:84, field:'#e6e2ea', player:'#6b5570', enemies:['#b29bb6','#9aa7b0','#c2a77f'] },
  { id:'rust',    title:'Rust Harvest', genre:'survivor · top-down', v:'v2', score:81, field:'#ece2d6', player:'#9a5e46', enemies:['#c98e6e','#a7a382','#bf9a8a'] },
  { id:'glass',   title:'Glasswing',    genre:'puzzle · grid',       v:'v1', score:79, field:'#eef1f3', player:'#5f7c8a', enemies:['#9aa7b0','#cdb89a','#a9b59c'] },
  { id:'bakery',  title:'Bakery Brawl', genre:'collector · arena',   v:'v1', score:76, field:'#f0e7da', player:'#a0744a', enemies:['#cda06a','#b0a07a','#c89a86'] },
];

/* ---- a tiny survivor sim that can run static or live (for hover) ---- */
class MiniSim {
  constructor(canvas, g){ this.c=canvas; this.x=canvas.getContext('2d'); this.g=g; this.en=[]; this.sh=[]; this.t=0; this.raf=null; this.fit(); }
  fit(){ const r=this.c.getBoundingClientRect(); this.c.width=r.width*devicePixelRatio; this.c.height=r.height*devicePixelRatio; this.x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); this.W=r.width; this.H=r.height; }
  bg(){ const {x,W,H,g}=this; x.fillStyle=g.field; x.fillRect(0,0,W,H);
    x.strokeStyle='rgba(38,36,31,0.04)'; for(let i=0;i<W;i+=24){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke();} for(let j=0;j<H;j+=24){x.beginPath();x.moveTo(0,j);x.lineTo(W,j);x.stroke();} }
  static(){ this.fit(); this.bg(); const {x,W,H,g}=this;
    [[0.28,0.36,0],[0.72,0.3,1],[0.64,0.7,2],[0.4,0.62,0],[0.8,0.6,1]].forEach(p=>{x.fillStyle=g.enemies[p[2]];x.beginPath();x.arc(W*p[0],H*p[1],4,0,7);x.fill();});
    x.fillStyle=g.player; x.beginPath(); x.arc(W*0.5,H*0.5,5.5,0,7); x.fill();
    x.strokeStyle=g.player+'66'; x.lineWidth=1.3; x.beginPath(); x.arc(W*0.5,H*0.5,10,0,7); x.stroke(); }
  start(){ if(this.raf) return; this.en=[]; this.sh=[]; const step=()=>{ this.frame(); this.raf=requestAnimationFrame(step); }; this.raf=requestAnimationFrame(step); }
  stop(){ if(this.raf) cancelAnimationFrame(this.raf); this.raf=null; this.static(); }
  frame(){ const {g,W,H}=this; this.t++; const x=this.x;
    const px=W/2+Math.cos(this.t*0.02)*W*0.22, py=H/2+Math.sin(this.t*0.026)*H*0.2;
    if(this.t%20===0 && this.en.length<14){ const e=Math.floor(Math.random()*4); let ex,ey; if(e===0){ex=0;ey=Math.random()*H;}else if(e===1){ex=W;ey=Math.random()*H;}else if(e===2){ex=Math.random()*W;ey=0;}else{ex=Math.random()*W;ey=H;} this.en.push({x:ex,y:ey,c:g.enemies[Math.floor(Math.random()*3)],s:0.5+Math.random()*0.5,r:3.5+Math.random()*2.5}); }
    this.bg();
    for(const en of this.en){ const dx=px-en.x,dy=py-en.y,d=Math.hypot(dx,dy)||1; en.x+=dx/d*en.s; en.y+=dy/d*en.s; x.fillStyle=en.c; x.beginPath(); x.arc(en.x,en.y,en.r,0,7); x.fill(); }
    if(this.t%14===0 && this.en.length){ let n=this.en[0],b=1e9; for(const en of this.en){const dd=(en.x-px)**2+(en.y-py)**2; if(dd<b){b=dd;n=en;}} const a=Math.atan2(n.y-py,n.x-px); this.sh.push({x:px,y:py,vx:Math.cos(a)*4,vy:Math.sin(a)*4,l:50}); }
    for(let i=this.sh.length-1;i>=0;i--){ const s=this.sh[i]; s.x+=s.vx; s.y+=s.vy; s.l--; x.fillStyle=g.player; x.beginPath(); x.arc(s.x,s.y,1.8,0,7); x.fill();
      for(let j=this.en.length-1;j>=0;j--){ const en=this.en[j]; if((en.x-s.x)**2+(en.y-s.y)**2<(en.r+2)**2){ this.en.splice(j,1); this.sh.splice(i,1); break; } } if(s.l<=0) this.sh.splice(i,1); }
    x.fillStyle=g.player; x.beginPath(); x.arc(px,py,5.5,0,7); x.fill();
    x.strokeStyle=g.player+'66'; x.lineWidth=1.3; x.beginPath(); x.arc(px,py,10,0,7); x.stroke();
  }
}

const grid = document.getElementById('grid');
GAMES.forEach((g, i) => {
  const card = document.createElement('div');
  card.className = 'card rise'; card.style.animationDelay = (0.18 + i*0.05)+'s';
  card.innerHTML = `
    <div class="thumb">
      <canvas></canvas>
      <span class="ver">${g.v}</span>
      <span class="liveflag"><span class="ld"></span>live</span>
      <div class="overlay">
        <button class="ob primary" data-act="play">▶ Play</button>
        <button class="ob" data-act="refine">Refine</button>
      </div>
    </div>
    <div class="cmeta">
      <div class="ct">${g.title}</div>
      <div class="crow"><span class="cs">${g.genre}</span><span class="csc"><span class="d" style="background:${g.player}"></span>${g.score}</span></div>
    </div>`;
  grid.appendChild(card);
  const sim = new MiniSim(card.querySelector('canvas'), g);
  requestAnimationFrame(()=>sim.static());
  card.addEventListener('mouseenter', ()=>sim.start());
  card.addEventListener('mouseleave', ()=>sim.stop());
  card.querySelector('[data-act=play]').addEventListener('click', e=>{ e.stopPropagation(); openGame(g); });
  card.querySelector('[data-act=refine]').addEventListener('click', e=>{ e.stopPropagation(); openDialog(g); });
  card.addEventListener('click', ()=>openGame(g));
});

/* ---- toasts ---- */
function toast(msg){
  const wrap=document.getElementById('toasts');
  const t=document.createElement('div'); t.className='toast'; t.innerHTML=`<span class="td"></span>${msg}`;
  wrap.appendChild(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),300); }, 2400);
}

/* ---- open game window ---- */
function openGame(g){
  const params = new URLSearchParams({ id:g.id, title:g.title, genre:g.genre, field:g.field, player:g.player, e0:g.enemies[0], e1:g.enemies[1], e2:g.enemies[2] });
  const w=980,h=660, left=(screen.width-w)/2, top=(screen.height-h)/2;
  const win = window.open('game.html?'+params, 'forge_play_'+g.id, `width=${w},height=${h},left=${left},top=${top}`);
  toast(win ? `Opening ${g.title} ↗` : `Allow pop-ups to play ${g.title}`);
}

/* ---- dialog ---- */
const scrim=document.getElementById('scrim'), dialog=document.getElementById('dialog'),
      dthread=document.getElementById('dthread'), dInput=document.getElementById('dInput'),
      dTitle=document.getElementById('dTitle'), dSub=document.getElementById('dSub');
const forgeAv='<div class="av forge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2l2.2 6.6H21l-5.4 4 2 6.6L12 15l-5.6 4.2 2-6.6L3 8.6h6.8z"/></svg></div>';
let activeGame=null, lastFocus=null;

function openDialog(game){
  activeGame=game||null; lastFocus=document.activeElement; dthread.innerHTML='';
  if(game){ dTitle.textContent='Refine · '+game.title; dSub.textContent=game.genre;
    forgeStream(`This is <b>${game.title}</b> (${game.v}, score ${game.score}). Tell me what to change — or open it to play.`);
  } else { dTitle.textContent='New game'; dSub.textContent='describe it in plain language';
    forgeStream('Describe a game and I’ll build a playable version. You can drop in a reference image for the look.', ()=>chips(['a calm coastal survivor','neon arena shooter','cozy collector game']));
  }
  scrim.classList.add('open'); dialog.classList.add('open');
  setTimeout(()=>dInput.focus(),180);
}
function closeDialog(){ scrim.classList.remove('open'); dialog.classList.remove('open'); if(lastFocus) lastFocus.focus(); }

function bubble(cls){ const t=document.createElement('div'); t.className='turn '+cls;
  t.innerHTML=(cls==='forge'?forgeAv:'<div class="av you">T</div>')+'<div class="tbody"><span class="who">'+(cls==='forge'?'Forge':'You')+'</span></div>';
  dthread.appendChild(t); return t.querySelector('.tbody'); }
function you(text){ const b=bubble('you'); const d=document.createElement('div'); d.className='text'; d.textContent=text; b.appendChild(d); end(); }
function forgeStream(html, done){
  const b=bubble('forge'); const d=document.createElement('div'); d.className='text'; b.appendChild(d);
  const caret=document.createElement('span'); caret.className='caret'; d.appendChild(caret);
  let i=0; const tmp=html;
  const timer=setInterval(()=>{ i+=2; d.innerHTML=tmp.slice(0,i)+'<span class="caret"></span>'; end();
    if(i>=tmp.length){ clearInterval(timer); d.innerHTML=tmp; if(done) done(); } }, 14);
}
function chips(list){ const b=bubble('forge'); const c=document.createElement('div'); c.className='chips';
  c.innerHTML=list.map(x=>`<span class="chip">${x}</span>`).join(''); b.appendChild(c); end();
  c.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{ dInput.value=ch.textContent; dInput.focus(); })); }
function build(){
  const b=bubble('forge'); const tr=document.createElement('div'); tr.className='trace';
  tr.innerHTML='<span class="step active"><span class="m">◴</span>spec</span><span class="step todo"><span class="m">·</span>patch</span><span class="step todo"><span class="m">·</span>build</span><span class="step todo"><span class="m">·</span>qa</span>';
  b.appendChild(tr); end();
  const steps=tr.querySelectorAll('.step'); let i=0;
  const timer=setInterval(()=>{ steps[i].className='step done'; steps[i].querySelector('.m').textContent='✓'; i++;
    if(i<steps.length){ steps[i].className='step active'; steps[i].querySelector('.m').textContent='◴'; }
    else { clearInterval(timer); ready(); } }, 620);
}
function ready(){
  const game=activeGame||GAMES[0]; const b=bubble('forge');
  const d=document.createElement('div'); d.className='text'; d.innerHTML=`Forged <b>${game.title}</b> — playable and on-theme. Score 94.`; b.appendChild(d);
  const r=document.createElement('div'); r.className='ready';
  r.innerHTML=`<span class="tk">✓</span> ready to play <button class="btn btn-primary ot" style="padding:8px 13px;font-size:13px">Open game ↗</button>`;
  b.appendChild(r); end();
  r.querySelector('.ot').addEventListener('click',()=>openGame(game));
}
function end(){ dthread.scrollTop=dthread.scrollHeight; }
function dialogSend(){ const v=dInput.value.trim(); if(!v) return; you(v); dInput.value=''; dInput.style.height='auto'; setTimeout(build,300); }

document.getElementById('newBtn').addEventListener('click',()=>openDialog(null));
document.getElementById('newCard').addEventListener('click',()=>openDialog(null));
document.getElementById('cmdk').addEventListener('click',()=>openDialog(null));
document.getElementById('closeBtn').addEventListener('click',closeDialog);
scrim.addEventListener('click',closeDialog);
document.getElementById('dSend').addEventListener('click',dialogSend);
dInput.addEventListener('input',()=>{ dInput.style.height='auto'; dInput.style.height=Math.min(dInput.scrollHeight,120)+'px'; });
dInput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); dialogSend(); } });
document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{ b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }));
document.querySelectorAll('.filters button').forEach(b=>b.addEventListener('click',()=>{ b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeDialog();
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); openDialog(null); }
});

// deep-link: ?new opens the create dialog on load
if(new URLSearchParams(location.search).has('new')){ setTimeout(()=>openDialog(null), 200); }
</script>
